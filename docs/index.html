<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票分析報告 - Stock Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        
        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 1em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card p {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        
        .reports-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .reports-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        #search {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }
        
        #search:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #reports-container {
            display: grid;
            gap: 15px;
        }
        
        .report-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        
        .report-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .report-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .report-info .date {
            color: #666;
            font-size: 0.9em;
        }
        
        .report-item a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .report-item a:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .no-reports {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
            
            .report-item {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 股票分析報告</h1>
            <p>每日自動更新 | Daily Automated Analysis</p>
        </header>
        
        <section class="stats">
            <div class="stat-card">
                <h3>總報告數</h3>
                <p id="total-reports">0</p>
            </div>
            <div class="stat-card">
                <h3>最新報告</h3>
                <p id="latest-report" style="font-size: 1.5em;">-</p>
            </div>
            <div class="stat-card">
                <h3>更新頻率</h3>
                <p style="font-size: 1.5em;">每日 07:00</p>
            </div>
        </section>
        
        <section class="reports-section">
            <h2>📊 報告列表</h2>
            <input type="text" id="search" placeholder="搜索日期或關鍵字...">
            <div id="reports-container">
                <div class="loading">載入中...</div>
            </div>
        </section>
        
        <footer>
            <p>Generated by Stock Analyzer | Powered by GitHub Actions</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                <a href="https://github.com" style="color: white; text-decoration: underline;">查看源碼</a>
            </p>
        </footer>
    </div>
    
    <script src="static/js/index.js"></script>
</body>
</html>
